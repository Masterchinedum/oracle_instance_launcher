name: Try launch OCI A1.Flex instance

on:
  schedule:
    # Every 5 minutes. GitHub's scheduler is best-effort and can lag during
    # high load, but this is the tightest practical interval for Actions cron.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you trigger a manual test run from the Actions tab

# Prevent overlapping runs from racing each other on a launch attempt.
concurrency:
  group: oci-launch
  cancel-in-progress: false

jobs:
  try-launch:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install oci

      - name: Attempt instance launch
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          OCI_IMAGE_OCID: ${{ secrets.OCI_IMAGE_OCID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_INSTANCE_DISPLAY_NAME: free-tier-a1
          OCI_BOOT_VOLUME_GB: "100"
          # Try biggest first, fall back to smaller within the same run.
          OCI_SHAPE_LADDER: "4,24; 4,12; 2,12; 2,6; 1,6"
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python launch_instance.py
